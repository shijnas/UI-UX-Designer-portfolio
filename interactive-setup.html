<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shijnas Yunus — Interactive Gaming Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .scene {
      position: relative;
      width: min(100vw, calc(100vh * 1376 / 768));
      height: min(100vh, calc(100vw * 768 / 1376));
    }
    .bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: fill;
      pointer-events: none;
      display: block;
    }
    /* Monitor screen bounds from pixel scan:
       Left=404 (29.36%), Top=117 (15.23%), Right=964, Bottom=480
       Width=560 (40.7%), Height=363 (47.27%) */
    .monitor {
      position: absolute;
      left: 29.36%;
      top: 15.23%;
      width: 40.7%;
      height: 47.27%;
      overflow: hidden;
      z-index: 1;
    }
    .monitor iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }
    /* Neon Sign Flickering Overlay */
    .overlay-neon {
      position: absolute;
      left: 12.35%; /* 170 / 1376 */
      top: 2.21%;   /* 17 / 768 */
      width: 18.9%;  /* 260 / 1376 */
      height: 23.44%; /* 180 / 768 */
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: screen;
      animation: neon-flicker 5s infinite;
      will-change: opacity;
      transform: translateZ(0);
    }
    /* Fan Rotating Overlays */
    .overlay-fan {
      position: absolute;
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: screen;
      animation: fan-spin 6s linear infinite;
      will-change: transform;
      transform: translateZ(0);
    }
    .overlay-fan.fan-front-top {
      left: 92.08%; top: 20.96%; width: 10.46%; height: 18.75%;
      transform-origin: center center;
    }
    .overlay-fan.fan-front-middle {
      left: 91.13%; top: 36.46%; width: 10.46%; height: 18.75%;
      transform-origin: center center;
      animation-duration: 8s;
      animation-direction: reverse;
    }
    .overlay-fan.fan-front-bottom {
      left: 91.93%; top: 52.6%; width: 10.46%; height: 18.75%;
      transform-origin: center center;
      animation-duration: 7s;
    }
    .overlay-fan.fan-rear {
      left: 75.29%; top: 27.21%; width: 9.3%; height: 16.67%;
      transform-origin: center center;
      animation-duration: 5s;
      animation-direction: reverse;
    }
    @keyframes fan-spin {
      from { transform: translateZ(0) rotate(0deg); }
      to { transform: translateZ(0) rotate(360deg); }
    }
    @keyframes neon-flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        opacity: 1;
      }
      20%, 24%, 55% {
        opacity: 0.35;
      }
      22% {
        opacity: 0.75;
      }
  </style>
</head>
<body>
  <div class="scene">
    <img class="bg" src="assets/gaming-setup-pov.jpg" alt="">
    <!-- Animated Fan & Neon Sign Overlays -->
    <img class="overlay-neon" src="assets/neon-sign.png" alt="">
    <img class="overlay-fan fan-front-top" src="assets/fan-front-top.png" alt="">
    <img class="overlay-fan fan-front-middle" src="assets/fan-front-middle.png" alt="">
    <img class="overlay-fan fan-front-bottom" src="assets/fan-front-bottom.png" alt="">
    <img class="overlay-fan fan-rear" src="assets/fan-rear.png" alt="">
    <div class="monitor">
      <iframe
        src="https://shijnas-yunus-portfolio1.vercel.app/"
        title="Shijnas Yunus Portfolio"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"
      ></iframe>
    </div>
  </div>
  <script>
    function resize() {
      const s = document.querySelector('.scene');
      const r = 1376/768, vw = window.innerWidth, vh = window.innerHeight;
      if (vw/vh > r) { s.style.width = vh*r+'px'; s.style.height = vh+'px'; }
      else { s.style.width = vw+'px'; s.style.height = vw/r+'px'; }
    }
    resize(); window.addEventListener('resize', resize);
  </script>
</body>
</html>
