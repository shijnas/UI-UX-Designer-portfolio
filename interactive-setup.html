<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shijnas Yunus — Interactive Gaming Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .scene {
      position: relative;
      width: min(100vw, calc(100vh * 1376 / 768));
      height: min(100vh, calc(100vw * 768 / 1376));
    }
    .bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: fill;
      pointer-events: none;
      display: block;
    }
    /* Monitor screen bounds from pixel scan:
       Left=423 (30.74%), Top=136 (17.71%), Right=952, Bottom=450
       Width=529 (38.44%), Height=314 (40.89%) */
    .monitor {
      position: absolute;
      left: 30.74%;
      top: 17.71%;
      width: 38.44%;
      height: 40.89%;
      overflow: hidden;
      z-index: 1;
    }
    .monitor iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="scene">
    <img class="bg" src="assets/gaming-setup-pov.jpg" alt="">
    <div class="monitor">
      <iframe
        src="https://shijnas-yunus-portfolio1.vercel.app/"
        title="Shijnas Yunus Portfolio"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"
      ></iframe>
    </div>
  </div>
  <script>
    function resize() {
      const s = document.querySelector('.scene');
      const r = 1376/768, vw = window.innerWidth, vh = window.innerHeight;
      if (vw/vh > r) { s.style.width = vh*r+'px'; s.style.height = vh+'px'; }
      else { s.style.width = vw+'px'; s.style.height = vw/r+'px'; }
    }
    resize(); window.addEventListener('resize', resize);
  </script>
</body>
</html>
